<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chord progressions and grip explorer for piano">
    <meta name="theme-color" content="#1a1814">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Chord Progressions">
    <link rel="apple-touch-icon" href="./Assets/Icons/icon-192.png">
    <link rel="manifest" href="./manifest.json">
    <title>Chord Progressions — Scales.sin</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a1814;
            --bg-secondary: #242018;
            --bg-card: #2a2520;
            --text-primary: #f5f0e8;
            --text-secondary: #a89f94;
            --accent: #e85d4c;
            --border: rgba(168, 159, 148, 0.15);

            --deg-1: #e85d4c;
            --deg-2: #e89a4c;
            --deg-3: #c9a227;
            --deg-4: #7db87d;
            --deg-5: #4a90a4;
            --deg-6: #8a6aa4;
            --deg-7: #a4586a;

            --white-key-w: 57px;
            --white-key-h: 234px;
            --black-key-w: 36px;
            --black-key-h: 150px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        header {
            position: relative;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .back-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--text-primary); }

        .brand-logo {
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 400;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* --- Controls --- */
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-group label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            cursor: pointer;
            outline: none;
        }

        select:focus { border-color: var(--accent); }

        /* --- Chord display --- */
        .chord-display {
            text-align: center;
            padding: 1.25rem 1.5rem;
        }

        .chord-name {
            font-family: 'Instrument Serif', serif;
            font-size: 2rem;
            font-weight: 400;
        }

        .chord-notes {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            letter-spacing: 0.05em;
        }

        /* --- Piano keyboard --- */
        .piano-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 1.5rem 0 2rem;
        }

        .piano {
            position: relative;
            display: flex;
            margin: 0 auto;
            width: fit-content;
            padding: 0 1.5rem;
        }

        .key {
            position: relative;
            cursor: pointer;
            transition: filter 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .key-white {
            width: var(--white-key-w);
            height: var(--white-key-h);
            background: linear-gradient(to bottom, #f5f0e8 0%, #e8e2d8 85%, #d8d0c4 100%);
            border: 1px solid #3a352e;
            border-radius: 0 0 5px 5px;
            z-index: 1;
        }

        .key-white:active,
        .key-white.pressed {
            background: linear-gradient(to bottom, #e8e2d8 0%, #d8d0c4 100%);
            height: calc(var(--white-key-h) - 2px);
            margin-top: 2px;
        }

        .key-white .key-label {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #6b6560;
            pointer-events: none;
        }

        .key-black {
            position: absolute;
            width: var(--black-key-w);
            height: var(--black-key-h);
            background: linear-gradient(to bottom, #2a2520 0%, #1a1814 60%, #0f0d0b 100%);
            border: 1px solid #0a0908;
            border-top: none;
            border-radius: 0 0 4px 4px;
            z-index: 2;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 -2px 4px rgba(0,0,0,0.3);
        }

        .key-black:active,
        .key-black.pressed {
            height: calc(var(--black-key-h) - 2px);
            margin-top: 2px;
            box-shadow: 0 2px 3px rgba(0,0,0,0.4), inset 0 -1px 2px rgba(0,0,0,0.3);
        }

        .key-black .key-label {
            position: absolute;
            bottom: 8px;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: #5a5550;
            pointer-events: none;
        }

        /* Highlighted keys — unified glow */
        .key-white.active {
            background: linear-gradient(to bottom,
                color-mix(in srgb, var(--highlight-color, var(--accent)) 20%, #fff) 0%,
                color-mix(in srgb, var(--highlight-color, var(--accent)) 10%, #f5f0e8) 100%);
            border-color: var(--highlight-color, var(--accent));
            box-shadow: 0 0 16px color-mix(in srgb, var(--highlight-color, var(--accent)) 50%, transparent),
                        0 0 40px color-mix(in srgb, var(--highlight-color, var(--accent)) 20%, transparent),
                        inset 0 0 24px color-mix(in srgb, var(--highlight-color, var(--accent)) 12%, transparent);
        }

        .key-white.active .key-label {
            color: var(--highlight-color, var(--accent));
            font-weight: 600;
        }

        .key-black.active {
            background: linear-gradient(to bottom,
                color-mix(in srgb, var(--highlight-color, var(--accent)) 35%, #2a2520) 0%,
                color-mix(in srgb, var(--highlight-color, var(--accent)) 18%, #1a1814) 100%);
            border-color: var(--highlight-color, var(--accent));
            box-shadow: 0 0 16px color-mix(in srgb, var(--highlight-color, var(--accent)) 50%, transparent),
                        0 0 40px color-mix(in srgb, var(--highlight-color, var(--accent)) 20%, transparent),
                        0 4px 6px rgba(0,0,0,0.4);
        }

        .key-black.active .key-label {
            color: var(--highlight-color, var(--accent));
            font-weight: 600;
        }

        /* Root indicator dot */
        .root-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--highlight-color, var(--accent));
            pointer-events: none;
        }

        .key-white .root-dot {
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
        }

        .key-black .root-dot {
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover { text-decoration: underline; }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            :root {
                --white-key-w: 46px;
                --white-key-h: 195px;
                --black-key-w: 29px;
                --black-key-h: 124px;
            }

            header { padding: 1rem 1rem; }
            .controls { padding: 1rem; gap: 0.75rem; }
            .chord-display { padding: 1rem; }
            .chord-name { font-size: 1.5rem; }
        }

        @media (max-width: 400px) {
            :root {
                --white-key-w: 39px;
                --white-key-h: 170px;
                --black-key-w: 24px;
                --black-key-h: 108px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-nav">
            <a href="./index.html" class="back-link">&larr; Scales.sin</a>
            <span class="brand-logo">SinAudio</span>
        </div>
        <h1>Chord Progressions</h1>
        <p class="subtitle">Grips &amp; Voicings</p>
    </header>

    <div class="controls">
        <div class="control-group">
            <label for="root-select">Root</label>
            <select id="root-select"></select>
        </div>
        <div class="control-group">
            <label for="chord-select">Chord</label>
            <select id="chord-select"></select>
        </div>
    </div>

    <div class="chord-display">
        <div class="chord-name" id="chord-name">Cmaj7</div>
        <div class="chord-notes" id="chord-notes">C  E  G  B</div>
    </div>

    <div class="piano-wrapper">
        <div class="piano" id="piano"></div>
    </div>

    <footer>
        <p>A <strong>SinAudio</strong> tool — <a href="https://sinaudio.co">sinaudio.co</a></p>
    </footer>

    <script>
    (() => {
        // --- Music data ---
        const NOTE_NAMES_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const NOTE_NAMES_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
        const DISPLAY_NAMES    = ['C','Db','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

        const FLAT_ROOTS = [1,3,5,8,10]; // Db, Eb, F, Ab, Bb use flats

        const CHORD_TYPES = {
            'maj':     { intervals: [0,4,7],       suffix: '' },
            'min':     { intervals: [0,3,7],       suffix: 'm' },
            'maj7':    { intervals: [0,4,7,11],    suffix: 'maj7' },
            'min7':    { intervals: [0,3,7,10],    suffix: 'm7' },
            '7':       { intervals: [0,4,7,10],    suffix: '7' },
            'dim':     { intervals: [0,3,6],       suffix: 'dim' },
            'dim7':    { intervals: [0,3,6,9],     suffix: 'dim7' },
            'aug':     { intervals: [0,4,8],       suffix: 'aug' },
            'min7b5':  { intervals: [0,3,6,10],    suffix: 'm7b5' },
            'sus2':    { intervals: [0,2,7],       suffix: 'sus2' },
            'sus4':    { intervals: [0,5,7],       suffix: 'sus4' },
            '9':       { intervals: [0,4,7,10,14], suffix: '9' },
            'maj9':    { intervals: [0,4,7,11,14], suffix: 'maj9' },
            'min9':    { intervals: [0,3,7,10,14], suffix: 'min9' },
            '6':       { intervals: [0,4,7,9],     suffix: '6' },
            'min6':    { intervals: [0,3,7,9],     suffix: 'm6' },
        };

        const DEGREE_COLORS = [
            'var(--deg-1)', 'var(--deg-2)', 'var(--deg-3)', 'var(--deg-4)',
            'var(--deg-5)', 'var(--deg-6)', 'var(--deg-7)'
        ];

        // --- State ---
        let currentRoot = 0; // C
        let currentChordType = 'maj7';

        // --- Keyboard config ---
        const START_OCTAVE = 3;
        const NUM_OCTAVES = 3;
        const WHITE_NOTES = [0,2,4,5,7,9,11]; // C D E F G A B pitch classes
        const BLACK_NOTES = [1,3,6,8,10];      // C# D# F# G# A#

        // Black key positions as fraction of white key index
        // Real piano: C#/D# grouped as pair, F#/G#/A# grouped as trio
        // Each value = center of black key in white-key units from octave start
        const BLACK_KEY_POSITIONS = {
            1:  0.6,  // C# — slightly right of center between C and D
            3:  1.7,  // D# — slightly left of center between D and E
            6:  3.55, // F# — slightly right of center between F and G
            8:  4.5,  // G# — centered between G and A
            10: 5.6,  // A# — slightly right of center between A and B
        };

        // --- Build controls ---
        function initControls() {
            const rootSelect = document.getElementById('root-select');
            const chordSelect = document.getElementById('chord-select');

            DISPLAY_NAMES.forEach((name, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = name;
                rootSelect.appendChild(opt);
            });

            Object.keys(CHORD_TYPES).forEach(type => {
                const opt = document.createElement('option');
                opt.value = type;
                opt.textContent = type;
                if (type === 'maj7') opt.selected = true;
                chordSelect.appendChild(opt);
            });

            rootSelect.addEventListener('change', () => {
                currentRoot = parseInt(rootSelect.value);
                render();
            });

            chordSelect.addEventListener('change', () => {
                currentChordType = chordSelect.value;
                render();
            });
        }

        // --- Get note name ---
        function noteName(pitchClass, useFlats) {
            return useFlats ? NOTE_NAMES_FLAT[pitchClass] : NOTE_NAMES_SHARP[pitchClass];
        }

        // --- Build keyboard ---
        function buildKeyboard() {
            const piano = document.getElementById('piano');
            piano.innerHTML = '';

            const whiteKeyW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--white-key-w'));
            const blackKeyW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--black-key-w'));

            // White keys first
            let whiteIndex = 0;
            for (let oct = 0; oct < NUM_OCTAVES; oct++) {
                for (let i = 0; i < 7; i++) {
                    const pc = WHITE_NOTES[i];
                    const midi = (START_OCTAVE + oct) * 12 + pc;
                    const key = document.createElement('div');
                    key.className = 'key key-white';
                    key.dataset.midi = midi;
                    key.dataset.pc = pc;

                    const label = document.createElement('span');
                    label.className = 'key-label';
                    label.textContent = NOTE_NAMES_SHARP[pc];
                    key.appendChild(label);

                    piano.appendChild(key);
                    whiteIndex++;
                }
            }
            // Extra C at the end to complete the range
            const endMidi = (START_OCTAVE + NUM_OCTAVES) * 12;
            const endKey = document.createElement('div');
            endKey.className = 'key key-white';
            endKey.dataset.midi = endMidi;
            endKey.dataset.pc = 0;
            const endLabel = document.createElement('span');
            endLabel.className = 'key-label';
            endLabel.textContent = 'C';
            endKey.appendChild(endLabel);
            piano.appendChild(endKey);

            // Black keys — positioned absolute over the white keys
            for (let oct = 0; oct < NUM_OCTAVES; oct++) {
                for (const pc of BLACK_NOTES) {
                    const midi = (START_OCTAVE + oct) * 12 + pc;
                    const posInOctave = BLACK_KEY_POSITIONS[pc];
                    const absoluteWhitePos = oct * 7 + posInOctave;
                    const leftPx = absoluteWhitePos * whiteKeyW - (blackKeyW / 2) + 24; // +24 for wrapper padding

                    const key = document.createElement('div');
                    key.className = 'key key-black';
                    key.dataset.midi = midi;
                    key.dataset.pc = pc;
                    key.style.left = leftPx + 'px';

                    const label = document.createElement('span');
                    label.className = 'key-label';
                    const useFlats = FLAT_ROOTS.includes(currentRoot);
                    label.textContent = noteName(pc, useFlats);
                    key.appendChild(label);

                    piano.appendChild(key);
                }
            }
        }

        // --- Highlight chord notes ---
        function highlightChord() {
            const chord = CHORD_TYPES[currentChordType];
            if (!chord) return;

            const chordPCs = chord.intervals.map(i => (currentRoot + i) % 12);
            const useFlats = FLAT_ROOTS.includes(currentRoot);

            // Update display
            const rootName = noteName(currentRoot, useFlats);
            document.getElementById('chord-name').textContent = rootName + chord.suffix;
            document.getElementById('chord-notes').textContent = chordPCs.map(pc => noteName(pc, useFlats)).join('  ');

            // Update black key labels for current key context
            document.querySelectorAll('.key-black .key-label').forEach(label => {
                const key = label.parentElement;
                const pc = parseInt(key.dataset.pc);
                label.textContent = noteName(pc, useFlats);
            });

            // Highlight keys
            document.querySelectorAll('.key').forEach(key => {
                const pc = parseInt(key.dataset.pc);
                const chordIndex = chordPCs.indexOf(pc);
                const isActive = chordIndex !== -1;

                key.classList.toggle('active', isActive);

                // Remove old root dots
                const oldDot = key.querySelector('.root-dot');
                if (oldDot) oldDot.remove();

                if (isActive) {
                    const colorIndex = chordIndex % DEGREE_COLORS.length;
                    key.style.setProperty('--highlight-color', DEGREE_COLORS[colorIndex]);

                    // Root gets a dot
                    if (pc === currentRoot) {
                        const dot = document.createElement('span');
                        dot.className = 'root-dot';
                        key.appendChild(dot);
                    }
                } else {
                    key.style.removeProperty('--highlight-color');
                }
            });
        }

        function render() {
            buildKeyboard();
            highlightChord();
        }

        // --- Init ---
        initControls();
        render();

        // Rebuild on resize for correct key sizing
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(render, 150);
        });
    })();
    </script>
</body>
</html>
